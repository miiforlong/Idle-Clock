
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idle Screensaver Infinite</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:#000;
    overflow:hidden;
    font-family:'Inter',sans-serif;
    cursor:none;
    transition:background 1s ease;
}

@keyframes shake {
    0%{transform:translate(0px,0px);}
    25%{transform:translate(-2px,1px);}
    50%{transform:translate(2px,-1px);}
    75%{transform:translate(-1px,2px);}
    100%{transform:translate(0px,0px);}
}

#screen{
    width:100vw;
    height:100vh;
    position:relative;
}

.container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

.level{
    font-size:14px;
    letter-spacing:3px;
    color:#aaa;
    margin-bottom:5px;
}

.rebirth{
    font-size:12px;
    color:#555;
    margin-bottom:5px;
}

.time{
    font-size:110px;
    color:#fff;
    letter-spacing:8px;
}

.date{color:#aaa;font-size:22px;margin-top:10px;}
.day{color:#666;font-size:14px;margin-top:5px;}

#idleUI{margin-top:25px;}
#score{color:#aaa;font-size:18px;}
#mult{color:#666;font-size:12px;margin-top:5px;}

#barWrap{
    height:6px;
    width:140px;
    background:rgba(255,255,255,0.1);
    margin:15px auto 0;
    border-radius:999px;
    overflow:hidden;
}

#bar{
    height:100%;
    width:0%;
    background:#fff;
    border-radius:999px;
}

.paddle{
    position:absolute;
    width:10px;
    height:90px;
    background:#fff;
    border-radius:999px;
    display:none;
}

#player{left:20px;top:50%;}
#bot{right:20px;top:50%;}

#ball{
    position:absolute;
    width:10px;
    height:10px;
    background:#fff;
    border-radius:50%;
    display:none;
}

</style>
</head>

<body>

<div id="screen">

<div class="container">

    <div class="rebirth" id="rebirth"></div>
    <div class="level" id="level">NIVEAU 0</div>

    <div class="time" id="time">00:00:00</div>
    <div class="date" id="date"></div>
    <div class="day" id="day"></div>

    <div id="idleUI">
        <div id="score">Score: 0</div>
        <div id="mult">Multiplier: x1.00</div>

        <div id="barWrap">
            <div id="bar"></div>
        </div>
    </div>

</div>

<div class="paddle" id="player"></div>
<div class="paddle" id="bot"></div>
<div id="ball"></div>

</div>

<script>

function clock(){
    const n=new Date();

    document.getElementById("time").textContent=
        String(n.getHours()).padStart(2,'0')+":"+
        String(n.getMinutes()).padStart(2,'0')+":"+
        String(n.getSeconds()).padStart(2,'0');

    const days=["DIM","LUN","MAR","MER","JEU","VEN","SAM"];
    document.getElementById("day").textContent=days[n.getDay()];

    document.getElementById("date").textContent=
        n.getDate()+"/"+(n.getMonth()+1)+"/"+n.getFullYear();
}
setInterval(clock,1000);
clock();

let level=0;
let rebirth=0;
let score=0;
let progress=0;
let last=performance.now();

function need(l){ return 10*Math.pow(1.35,l); }

function bg(l){
    if(l<15) return "#000";
    let r=Math.min(255,80+(l-15)*10);
    return `rgb(${r},0,0)`;
}

function updateUI(){
    document.getElementById("level").textContent="NIVEAU "+level;
    document.getElementById("rebirth").textContent=
        rebirth>0 ? "REBIRTH x"+rebirth : "";
}

function rebirthNow(){
    rebirth++;
    level=0;
    progress=0;
    score=0;
}

let pong=false;
let afk=0;

const player=document.getElementById("player");
const bot=document.getElementById("bot");
const ball=document.getElementById("ball");

let py=0;
let by=0;

let bx=window.innerWidth/2;
let by2=window.innerHeight/2;

let vx=420;
let vy=260;

function enablePong(){
    if(pong) return;
    pong=true;
    player.style.display="block";
    bot.style.display="block";
    ball.style.display="block";
}

function disablePong(){
    pong=false;
    player.style.display="none";
    bot.style.display="none";
    ball.style.display="none";
}

document.addEventListener("keydown",(e)=>{
    afk=0;

    if(e.key==="ArrowUp"||e.key==="ArrowDown") enablePong();

    if(e.key==="ArrowUp") py-=35;
    if(e.key==="ArrowDown") py+=35;
});

function loop(now){

    let dt=(now-last)/1000;
    last=now;

    afk+=dt;
    if(afk>9) disablePong();

    let speed=1+level*0.25;

    score+=speed*dt;
    progress+=speed*dt;

    let needV=need(level);

    let p=progress/needV;
    document.getElementById("bar").style.width=Math.min(p,1)*100+"%";

    while(progress>=needV){
        level++;
        progress-=needV;
        document.body.style.background=bg(level);

        if(level>=1000 && confirm("REBIRTH ?")){
            rebirthNow();
        }

        needV=need(level);
    }

    updateUI();

    document.getElementById("score").textContent="Score: "+Math.floor(score);
    document.getElementById("mult").textContent="Multiplier: x"+speed.toFixed(2);

    if(pong){

        const w=window.innerWidth;
        const h=window.innerHeight;

        py = Math.max(-h/2+60, Math.min(h/2-60, py));
        player.style.top=(h/2+py)+"px";

        let target=(by2 - h/2);
        by += (target - by) * 0.12;
        bot.style.top=(h/2+by)+"px";

        bx += vx*dt;
        by2 += vy*dt;

        if(by2<0){by2=0;vy*=-1;}
        if(by2>h){by2=h;vy*=-1;}

        if (
            bx < 40 &&
            by2 > h/2 + py - 60 &&
            by2 < h/2 + py + 60 &&
            vx < 0
        ){
            vx = Math.abs(vx);
            score += 5;
        }

        if(
            bx>w-40 &&
            by2>h/2+by-60 &&
            by2<h/2+by+60
        ){
            vx=-Math.abs(vx);
        }

        if(bx<0||bx>w){
            bx=w/2;
            by2=h/2;
            vx*=-1;
        }

        ball.style.left=bx+"px";
        ball.style.top=by2+"px";
    }

    requestAnimationFrame(loop);
}

updateUI();
requestAnimationFrame(loop);

let wakeLock = null;

async function keepScreenAwake() {
    try {
        if ('wakeLock' in navigator) {
            wakeLock = await navigator.wakeLock.request('screen');
        }
    } catch (err) {
        console.log("Wake Lock non supporté ou refusé");
    }
}

document.addEventListener("mousemove", keepScreenAwake);
document.addEventListener("keydown", keepScreenAwake);
document.addEventListener("click", keepScreenAwake);

</script>

</body>
</html>
